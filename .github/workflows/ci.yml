name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  clasp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clasp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: clasp/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run test:run

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run test:run

  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Integration suite needs a live GAS deployment URL + secret — not run in CI.
